version: "3.9"

services:

  # ── Main App ───────────────────────────────────────────────
  luxe-shop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxe-shop-app
    image: luxe-shop:local
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "app=luxe-shop"
      - "env=local"

